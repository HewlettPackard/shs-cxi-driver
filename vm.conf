#
# cxi-driver configuration for the shared vm-tools framework.
# Sourced after vm-tools/vm-lib.sh; only the values that differ from the
# framework defaults are set here.

# 2G is enough for the cxi-driver tests.
VM_MEMORY="${VM_MEMORY:-2G}"
VM_CPUS="${VM_CPUS:-1}"

# Leave VM_DEVICE empty so the launcher uses $NETSIM_CCN (ccn vs ccn30 chosen
# by netsim) -- works on both main and cas3.
VM_DEVICE="${VM_DEVICE:-}"

# C1 firmware artifacts, mounted read-only at /lib/firmware in the guest.
VM_FIRMWARE_RODIR="${VM_FIRMWARE_RODIR:-$VM_DEVBOOTSTRAP_DIR/hms-artifacts}"

# Interactive boots load the cxi drivers via scripts/startvm-setup.sh.
VM_INIT_SCRIPT="${VM_INIT_SCRIPT:-./startvm-setup.sh}"

# Scratch dir exposed read-write when TESTING=1 (interactive test sessions).
VM_TEST_RWDIR="${VM_TEST_RWDIR:-$(pwd)/../tests/tmptests}"
